<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="sidebar bg-dark text-white p-3">
        <h4 class="mb-4 text-center border-bottom pb-2">Admin</h4>
        <ul class="nav flex-column">
            <li class="nav-item mb-2">
                <a href="#" class="nav-link text-white active"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
            </li>
            <li class="nav-item mb-2">
                <a href="#" class="nav-link text-white"><i class="bi bi-people me-2"></i> Students</a>
            </li>
            <li class="nav-item mb-2">
                <a href="#" class="nav-link text-white"><i class="bi bi-journal-text me-2"></i> Mock Tests</a>
            </li>
            <li class="nav-item mb-2">
                <a href="#" class="nav-link text-white"><i class="bi bi-graph-up me-2"></i> Results</a>
            </li>
            <li class="nav-item mt-5">
                <a href="#" class="nav-link text-danger"><i class="bi bi-box-arrow-left me-2"></i> Logout</a>
            </li>
        </ul>
    </div>

    <div class="main-content">
        <nav class="navbar navbar-light bg-white px-4 py-3 shadow-sm mb-4">
            <span class="navbar-brand mb-0 h1 fs-4">Overview</span>
            <div class="d-flex align-items-center">
                <span class="me-3 text-muted">Admin User</span>
                <i class="bi bi-person-circle fs-3 text-secondary"></i>
            </div>
        </nav>

        <div class="container-fluid px-4">
            <div class="row g-4">
                
                <div class="col-12 col-sm-6 col-xl-3">
                    <div class="card bg-primary text-white h-100 shadow-sm border-0">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="card-title text-uppercase mb-2 text-white-50">Total Students</h6>
                                    <h2 class="display-6 fw-bold mb-0">3,450</h2>
                                </div>
                                <i class="bi bi-people-fill display-4 opacity-50"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-sm-6 col-xl-3">
                    <div class="card bg-success text-white h-100 shadow-sm border-0">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="card-title text-uppercase mb-2 text-white-50">Active Exams</h6>
                                    <h2 class="display-6 fw-bold mb-0">12</h2>
                                </div>
                                <i class="bi bi-pencil-square display-4 opacity-50"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-sm-6 col-xl-3">
                    <div class="card bg-warning text-dark h-100 shadow-sm border-0">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="card-title text-uppercase mb-2 text-dark-50">Avg. Score</h6>
                                    <h2 class="display-6 fw-bold mb-0">74%</h2>
                                </div>
                                <i class="bi bi-bar-chart-fill display-4 opacity-50"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-sm-6 col-xl-3">
                    <div class="card bg-danger text-white h-100 shadow-sm border-0">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="card-title text-uppercase mb-2 text-white-50">Pending Results</h6>
                                    <h2 class="display-6 fw-bold mb-0">142</h2>
                                </div>
                                <i class="bi bi-exclamation-circle-fill display-4 opacity-50"></i>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
