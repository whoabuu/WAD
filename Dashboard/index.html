<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="sidebar">
        <h4 class="text-center">Admin</h4>
        <hr>

        <ul class="nav flex-column">
            <li class="nav-item"><a href="#" class="nav-link active">Dashboard</a></li>
            <li class="nav-item"><a href="#" class="nav-link">Orders</a></li>
            <li class="nav-item"><a href="#" class="nav-link">Users</a></li>
            <li class="nav-item"><a href="#" class="nav-link">Reports</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">

        <h2 class="mb-4">Dashboard</h2>

        <!-- Cards -->
        <div class="row g-3">

            <div class="col-12 col-sm-6 col-md-3">
                <div class="card card-box bg-primary text-white">
                    Orders: 1250
                </div>
            </div>

            <div class="col-12 col-sm-6 col-md-3">
                <div class="card card-box bg-success text-white">
                    Revenue: ₹75000
                </div>
            </div>

            <div class="col-12 col-sm-6 col-md-3">
                <div class="card card-box bg-warning text-dark">
                    Users: 320
                </div>
            </div>

            <div class="col-12 col-sm-6 col-md-3">
                <div class="card card-box bg-danger text-white">
                    Pending: 18
                </div>
            </div>

        </div>

        <!-- Table -->
        <div class="card mt-4">
            <div class="card-header">Recent Orders</div>

            <div class="card-body table-responsive">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Status</th>
                            <th>Amount</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr>
                            <td>Rahul</td>
                            <td class="text-success">Delivered</td>
                            <td>₹1200</td>
                        </tr>

                        <tr>
                            <td>Anita</td>
                            <td class="text-warning">Pending</td>
                            <td>₹850</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

</div>

</body>
</html>
